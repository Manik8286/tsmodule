<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cybersecurity Lab Tracker — Learning Path</title>
<style>
:root{--kali:#1A0A2E;--kali2:#2D1A4A;--red:#DC2626;--red-light:#FEF2F2;--green:#16A34A;--green-light:#F0FDF4;--purple:#7C3AED;--purple-light:#F5F3FF;--orange:#EA580C;--orange-light:#FFF7ED;--cyan:#0891B2;--cyan-light:#ECFEFF;--dark:#111827;--gray:#6B7280;--light:#F3F4F6;--white:#FFFFFF;--radius:10px;--shadow:0 2px 12px rgba(0,0,0,.1);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:#0F0C1A;color:#E2D9F3;min-height:100vh;}
.site-header{background:var(--kali);color:white;padding:22px 28px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.5);border-bottom:1px solid #3D1A6E;}
.site-header h1{font-size:19px;font-weight:700;color:#E879F9;}
.site-header p{font-size:11px;color:#A78BFA;margin-top:2px;}
.header-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.nav-link{font-size:11px;padding:4px 11px;border-radius:6px;background:rgba(232,121,249,.12);color:#C4B5FD;text-decoration:none;font-weight:600;transition:all .2s;}
.nav-link:hover{background:rgba(232,121,249,.25);color:white;}
.overall-card{background:rgba(255,255,255,.05);backdrop-filter:blur(8px);border:1px solid rgba(124,58,237,.3);border-radius:var(--radius);padding:18px 24px;margin:20px 20px 0;display:flex;gap:24px;align-items:center;flex-wrap:wrap;}
.stat-block{text-align:center;min-width:64px;}
.stat-block .num{font-size:26px;font-weight:800;line-height:1;}
.stat-block .lbl{font-size:10px;color:#A78BFA;margin-top:3px;text-transform:uppercase;letter-spacing:.5px;}
.stat-block.total .num{color:#E879F9;}
.stat-block.done .num{color:#4ADE80;}
.stat-block.s1 .num{color:#F87171;}
.stat-block.s2 .num{color:#60A5FA;}
.stat-block.s3 .num{color:#FBBF24;}
.big-bar-wrap{flex:1;min-width:200px;}
.big-bar-label{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:5px;color:#C4B5FD;}
.big-bar{background:rgba(255,255,255,.1);border-radius:99px;height:16px;overflow:hidden;}
.big-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#7C3AED,#E879F9);transition:width .5s ease;}
.cert-tabs{display:flex;gap:6px;margin:14px 20px 0;flex-wrap:wrap;}
.ctab{padding:6px 14px;border-radius:8px;border:2px solid rgba(124,58,237,.3);font-size:11px;font-weight:600;cursor:pointer;background:rgba(255,255,255,.04);color:#A78BFA;transition:all .2s;}
.ctab:hover{background:rgba(124,58,237,.15);}
.ctab.active{background:var(--kali2);color:#E879F9;border-color:#7C3AED;}
.ctab.ejpt{--c:#16A34A;}.ctab.ejpt.active{background:#052E16;color:#4ADE80;border-color:#16A34A;}
.ctab.security{--c:#EA580C;}.ctab.security.active{background:#431407;color:#FB923C;border-color:#EA580C;}
.ctab.ceh{--c:#0891B2;}.ctab.ceh.active{background:#082F49;color:#38BDF8;border-color:#0891B2;}
.ctab.oscp{--c:#DC2626;}.ctab.oscp.active{background:#450A0A;color:#F87171;border-color:#DC2626;}
#content{padding:14px 20px 60px;display:flex;flex-direction:column;gap:16px;}
.phase-card{background:rgba(255,255,255,.04);border:1px solid rgba(124,58,237,.2);border-radius:var(--radius);overflow:hidden;}
.phase-header{background:linear-gradient(135deg,#1A0A2E,#2D1A4A);color:white;padding:12px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;user-select:none;}
.phase-header:hover{filter:brightness(1.1);}
.phase-header-left{display:flex;align-items:center;gap:10px;}
.phase-badge{font-size:10px;font-weight:700;background:rgba(232,121,249,.2);padding:3px 9px;border-radius:99px;letter-spacing:.5px;color:#E879F9;}
.phase-title{font-size:15px;font-weight:700;}
.phase-week{font-size:11px;color:#A78BFA;margin-top:1px;}
.phase-progress-bar{background:rgba(255,255,255,.15);border-radius:99px;height:7px;width:100px;overflow:hidden;flex-shrink:0;}
.phase-progress-fill{height:100%;border-radius:99px;background:#4ADE80;transition:width .4s ease;}
.chevron{font-size:16px;transition:transform .25s;flex-shrink:0;}
.phase-card.open .chevron{transform:rotate(180deg);}
.phase-body{display:none;}
.phase-card.open .phase-body{display:block;}
.lab-section{border-top:1px solid rgba(124,58,237,.15);}
.lab-header{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;gap:10px;}
.lab-header.recon-lab{border-left:4px solid #7C3AED;background:rgba(124,58,237,.08);}
.lab-header.web-lab{border-left:4px solid #EA580C;background:rgba(234,88,12,.06);}
.lab-header.net-lab{border-left:4px solid #0891B2;background:rgba(8,145,178,.06);}
.lab-header.exploit-lab{border-left:4px solid #DC2626;background:rgba(220,38,38,.06);}
.lab-header.pw-lab{border-left:4px solid #CA8A04;background:rgba(202,138,4,.06);}
.lab-header.post-lab{border-left:4px solid #16A34A;background:rgba(22,163,74,.06);}
.lab-header.forensics-lab{border-left:4px solid #0891B2;background:rgba(8,145,178,.06);}
.lab-header.wireless-lab{border-left:4px solid #9333EA;background:rgba(147,51,234,.06);}
.lab-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;color:white;flex-shrink:0;}
.badge-recon{background:#7C3AED;}.badge-web{background:#EA580C;}.badge-net{background:#0891B2;}
.badge-exploit{background:#DC2626;}.badge-pw{background:#CA8A04;}.badge-post{background:#16A34A;}
.badge-forensics{background:#0891B2;}.badge-wireless{background:#9333EA;}
.lab-title-area{flex:1;}
.lab-title{font-size:13px;font-weight:700;color:#E2D9F3;}
.lab-meta{font-size:11px;color:#A78BFA;margin-top:1px;}
.lab-stats{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.lab-mini-bar{width:60px;height:5px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;}
.lab-mini-fill{height:100%;background:#4ADE80;border-radius:99px;transition:width .3s;}
.lab-toggle{font-size:10px;padding:3px 10px;border-radius:6px;border:1.5px solid rgba(124,58,237,.5);cursor:pointer;font-weight:600;background:rgba(124,58,237,.1);color:#A78BFA;transition:all .2s;}
.lab-toggle:hover{background:rgba(124,58,237,.3);color:#E879F9;}
.steps-list{padding:0 18px 12px;display:none;}
.lab-section.open .steps-list{display:block;}
.section-lbl{font-size:9px;font-weight:700;color:#A78BFA;text-transform:uppercase;letter-spacing:.6px;margin:10px 0 4px;}
.step-row{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;border-radius:7px;margin-bottom:2px;transition:background .15s;cursor:pointer;}
.step-row:hover:not(.locked){background:rgba(255,255,255,.04);}
.step-row.done{background:rgba(22,163,74,.08);}
.step-row.done .step-text{text-decoration:line-through;color:#6B7280;}
.step-row.locked{opacity:.4;cursor:not-allowed;}
.step-check{width:16px;height:16px;border-radius:4px;border:2px solid rgba(124,58,237,.4);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.step-row.done .step-check{background:#16A34A;border-color:#16A34A;color:white;}
.step-row:not(.done):not(.locked):hover .step-check{border-color:#7C3AED;}
.step-check::after{content:'✓';font-size:10px;color:white;display:none;}
.step-row.done .step-check::after{display:block;}
.step-text{font-size:12px;color:#C4B5FD;line-height:1.5;flex:1;}
.step-tag{font-size:9px;padding:1px 6px;border-radius:99px;font-weight:700;flex-shrink:0;margin-top:2px;}
.tag-tool{background:#1E3A5F;color:#60A5FA;}
.tag-concept{background:#1A1A3A;color:#A78BFA;}
.tag-ctf{background:#2D1A00;color:#FBBF24;}
.tag-cert{background:#1A2E1A;color:#4ADE80;}
.resources-section{background:rgba(0,0,0,.2);border-top:1px solid rgba(124,58,237,.1);padding:10px 18px;}
.res-title{font-size:9px;font-weight:700;color:#A78BFA;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.res-link{display:inline-block;font-size:10px;color:#60A5FA;background:rgba(96,165,250,.1);border-radius:4px;padding:2px 7px;margin:2px 3px 2px 0;text-decoration:none;}
.res-link:hover{background:rgba(96,165,250,.25);}
</style>
</head>

// ── Storage ───────────────────────────────────────────────────────────────────
const KEY='cyber_lab_progress_v2';
let PROGRESS={};
try{ PROGRESS=JSON.parse(localStorage.getItem(KEY)||'{}'); }catch(e){}
function save(){ localStorage.setItem(KEY,JSON.stringify(PROGRESS)); }

function isDone(lid,sid){ return !!(PROGRESS[lid]&&PROGRESS[lid][sid]); }
function toggleStep(lid,sid,el){
  if(!PROGRESS[lid]) PROGRESS[lid]={};
  PROGRESS[lid][sid]=!PROGRESS[lid][sid];
  if(!PROGRESS[lid][sid]) delete PROGRESS[lid][sid];
  save();
  el.classList.toggle('done',isDone(lid,sid));
  el.querySelector('.step-check').classList.toggle('done',isDone(lid,sid));
  updateStats();
  updateLabMini(lid);
  updatePhaseProgress();
}

function labDoneCount(lid){
  const lab=PHASES.flatMap(p=>p.labs).find(l=>l.id===lid);
  if(!lab) return {done:0,total:0};
  const done=lab.steps.filter((_,i)=>isDone(lid,'s'+i)).length;
  return {done,total:lab.steps.length};
}

// ── Render ─────────────────────────────────────────────────────────────────────
let activeCert='all';

function filterCert(cert,tabEl){
  activeCert=cert;
  document.querySelectorAll('.ctab').forEach(t=>t.classList.remove('active'));
  if(tabEl) tabEl.classList.add('active');
  render();
}

function render(){
  const cont=document.getElementById('content');
  cont.innerHTML='';
  PHASES.forEach(phase=>{
    if(activeCert!=='all'&&!phase.certs.includes(activeCert)) return;
    const card=document.createElement('div');
    card.className='phase-card';
    card.id='phase-'+phase.id;

    const {done,total}=phaseProgress(phase);
    const pct=total?Math.round((done/total)*100):0;

    card.innerHTML=`
      <div class="phase-header" onclick="togglePhase('${phase.id}')">
        <div class="phase-header-left">
          <span class="phase-badge">${phase.badge}</span>
          <div>
            <div class="phase-title">${phase.title}</div>
            <div class="phase-week">${phase.week} &middot; Certs: ${phase.certs.join(', ')}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-size:11px;font-weight:700;color:#4ADE80;">${done}/${total}</div>
            <div style="font-size:9px;color:#A78BFA;">${pct}% done</div>
          </div>
          <div class="phase-progress-bar"><div class="phase-progress-fill" style="width:${pct}%"></div></div>
          <span class="chevron">&#9660;</span>
        </div>
      </div>
      <div class="phase-body" id="phase-body-${phase.id}"></div>`;

    const body=card.querySelector('.phase-body');
    phase.labs.forEach(lab=>{
      const sec=document.createElement('div');
      sec.className='lab-section';
      sec.id='lab-'+lab.id;

      const {done:ld,total:lt}=labDoneCount(lab.id);
      const lpct=lt?Math.round((ld/lt)*100):0;

      sec.innerHTML=`
        <div class="lab-header ${lab.cat}-lab" onclick="toggleLab('${lab.id}')">
          <span class="lab-badge badge-${lab.badge}">${lab.badgeLabel}</span>
          <div class="lab-title-area">
            <div class="lab-title">${lab.title}</div>
            <div class="lab-meta">${lab.meta}</div>
          </div>
          <div class="lab-stats">
            <span style="font-size:10px;color:#A78BFA;">${ld}/${lt}</span>
            <div class="lab-mini-bar"><div class="lab-mini-fill" id="mini-${lab.id}" style="width:${lpct}%"></div></div>
            <button class="lab-toggle">Details</button>
          </div>
        </div>
        <div class="steps-list" id="steps-${lab.id}">
          <div class="section-lbl">Tasks &amp; Learning Objectives</div>
          ${lab.steps.map((s,i)=>`
            <div class="step-row ${isDone(lab.id,'s'+i)?'done':''}" onclick="toggleStep('${lab.id}','s${i}',this)" id="step-${lab.id}-s${i}">
              <div class="step-check ${isDone(lab.id,'s'+i)?'done':''}"></div>
              <div class="step-text">${s.text}</div>
              ${s.tags.map(t=>`<span class="step-tag tag-${t}">${t}</span>`).join('')}
            </div>`).join('')}
          ${lab.resources&&lab.resources.length?`
          <div class="resources-section">
            <div class="res-title">Resources</div>
            ${lab.resources.map(r=>`<a class="res-link" href="${r}" target="_blank" rel="noopener">${r.replace(/https?:\/\//,'').split('/')[0]}</a>`).join('')}
          </div>`:''}
        </div>`;

      body.appendChild(sec);
    });
    cont.appendChild(card);
  });
  updateStats();
}

function phaseProgress(phase){
  let done=0,total=0;
  phase.labs.forEach(lab=>{
    lab.steps.forEach((_,i)=>{ total++; if(isDone(lab.id,'s'+i)) done++; });
  });
  return {done,total};
}

function togglePhase(id){
  const card=document.getElementById('phase-'+id);
  card.classList.toggle('open');
}

function toggleLab(id){
  const sec=document.getElementById('lab-'+id);
  sec.classList.toggle('open');
}

function updateLabMini(lid){
  const {done,total}=labDoneCount(lid);
  const el=document.getElementById('mini-'+lid);
  if(el) el.style.width=total?`${Math.round((done/total)*100)}%`:'0%';
}

function updatePhaseProgress(){
  PHASES.forEach(phase=>{
    const {done,total}=phaseProgress(phase);
    const pct=total?Math.round((done/total)*100):0;
    const card=document.getElementById('phase-'+phase.id);
    if(!card) return;
    const fill=card.querySelector('.phase-progress-fill');
    if(fill) fill.style.width=pct+'%';
    const nums=card.querySelectorAll('.phase-header [style*="font-weight:700"]');
    if(nums[0]) nums[0].textContent=`${done}/${total}`;
    if(nums[1]||nums[0]){
      const sub=card.querySelector('.phase-header [style*="font-size:9px"]');
      if(sub) sub.textContent=`${pct}% done`;
    }
  });
}

function updateStats(){
  let total=0,done=0,labsDone=0;
  PHASES.forEach(ph=>{
    ph.labs.forEach(lab=>{
      const {done:ld,total:lt}=labDoneCount(lab.id);
      total+=lt; done+=ld;
      if(ld===lt&&lt>0) labsDone++;
    });
  });
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-done').textContent=done;
  document.getElementById('stat-phases').textContent=PHASES.length;
  document.getElementById('stat-flags').textContent=labsDone;
  const pct=total?Math.round((done/total)*100):0;
  document.getElementById('stat-pct').textContent=pct+'%';
  document.getElementById('bar-pct').textContent=pct+'%';
  document.getElementById('big-fill').style.width=pct+'%';
}

window.onload=render;
</script>
